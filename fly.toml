# Fly.io configuration for Folliscope.
# Deploy: install `flyctl`, then `fly launch --copy-config` (first time)
# or `fly deploy` (subsequent).
app = "folliscope"
primary_region = "sin"   # Singapore, closest to Indonesia

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  # Override via `fly secrets set FOLLISCOPE_ENTREZ_EMAIL=you@example.com`
  # to attribute your NCBI Entrez quota properly.

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true     # scale to zero when idle (free tier friendly)
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
